face-record/lib/src/ports/record_search_tag_extractor.dart << 'DARTEOF'\nimport '../models/record_meta.dart';\nimport '../models/search_tag.dart';\n\n/// Non-generic search-tag extraction interface.\n///\n/// The [RecordAdapterRegistry] stores one of these per module so it can\n/// regenerate search tags from saved records without knowing the module's\n/// contract type.\nabstract interface class RecordSearchTagExtractor {\n  String get module;\n\n  List<SearchTag> extractSearchTags(\n    RecordMeta meta,\n    Map<String, dynamic>? moduleData,\n  );\n}\nDARTEOF\n\ncat > /Users/jingtaiwei/Git/Public/xuan-migration/repository-interface-record/lib/src/ports/record_module_codec.dart << 'DARTEOF'\nimport '../models/record_meta.dart';\nimport 'record_search_tag_extractor.dart';\n\n/// Result of encoding a module contract into a [RecordMeta].\ntypedef EncodedRecord = ({\n  RecordMeta meta,\n  Map<String, dynamic>? moduleData,\n});\n\n/// Type-safe codec for converting between a module's contract type\n/// [TContract] and the unified [RecordMeta] storage model.\n///\n/// Each divination module implements this once.  The generic parameter gives\n/// the Base repository compile-time type safety instead of runtime casts.\n///\n/// This interface also extends [RecordSearchTagExtractor] so the same\n/// concrete codec can be registered in the non-generic adapter registry.\nabstract interface class RecordModuleCodec<TContract>\n    implements RecordSearchTagExtractor {\n  String get category;\n  String get divinationType;\n\n  /// Returns the UUID of [contract] (may be empty for unsaved records).\n  String uuidOf(TContract contract);\n\n  /// Returns a copy of [contract] with the UUID replaced by [uuid].\n  /// Only the UUID and any contract-allowed derived fields may change.\n  TContract withUuid(TContract contract, String uuid);\n\n  /// Encodes [contract] into a [RecordMeta] and optional module data.\n  ///\n  /// The returned [RecordMeta.module] must equal [module].\n  /// The returned [RecordMeta.scopeUid] must equal [scopeUid].\n  EncodedRecord encode(\n    TContract contract, {\n    required String scopeUid,\n  });\n\n  /// Decodes a [RecordMeta] (and optional module data) back into [TContract].\n  ///\n  /// Must throw [RecordCodecMismatch] if [meta.module] does not match\n  /// [module], rather than silently casting.\n  TContract decode(\n    RecordMeta meta,\n    Map<String, dynamic>? moduleData,\n  );\n}\nDARTEOF\n\ncat > /Users/jingtaiwei/Git/Public/xuan-migration/repository-interface-record/lib/src/ports/record_index_repository.dart << 'DARTEOF'\nimport '../models/record_meta.dart';\n\n/// Scope-bound index query port.\n///\n/// Implementations are always bound to a single scope; all queries\n/// automatically filter to that scope.\nabstract interface class RecordIndexRepository {\n  /// Returns records matching the given index key/value within the current\n  /// scope and module, excluding soft-deleted records.\n  ///\n  /// Results are ordered by `createdAt DESC, uuid ASC`.\n  Future<List<RecordMeta>> findByIndex({\n    required String module,\n    required String indexKey,\n    required String indexValue,\n    required int limit,\n  });\n\n  /// Streams records matching the given index key/value within the current\n  /// scope and module, excluding soft-deleted records.\n  ///\n  /// Emits a new list whenever matching records are inserted, updated,\n  /// or deleted.\n  Stream<List<RecordMeta>> watchByIndex({\n    required String module,\n    required String indexKey,\n    required String indexValue,\n  });\n}\nDARTEOF\n\ncat > /Users/jingtaiwei/Git/Public/xuan-migration/repository-interface-record/lib/src/ports/scoped_record_store.dart << 'DARTEOF'\nimport 'record_repository.dart';\nimport 'record_index_repository.dart';\n\n/// A scope-bound store that provides both record CRUD and index-query\n/// capabilities from a single, consistent scope.\n///\n/// [BaseRecordBackedRepository] depends on this interface rather than on\n