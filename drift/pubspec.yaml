  repository_interface_liuyao:
    path: ../../repository-interface-liuyao
  repository_interface_record:
    path: ../../repository-interface-record
  repository_interface_account:
    path: ../../repository-interface-account
  repository_interface_ai:
    path: ../../repository-interface-ai
  repository_interface_qizhengsiyu:
    path: ../../repository-interface-qizhengsiyu
  repository_interface_daliuren:
    path: ../../repository-interface-daliuren
  repository_interface_qimendunjia:
    path: ../../repository-interface-qimendunjia
  repository_interface_taiyishenshu:
    path: ../../repository-interface-taiyishenshu
  taiyishenshu:
    path: ../../xuan-taiyishenshu

dev_dependencies:
  flutter_test:
