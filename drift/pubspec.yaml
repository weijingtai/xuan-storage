  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.30.1
  drift_flutter: ^0.2.8
  path_provider: ^2.1.5
  uuid: 4.5.2
  collection: ^1.19.1
  json_annotation: ^4.10.0
  persistence_core:
    path: ../core
  persistence_domain:
    path: ../../xuan-domain
  metaphysics_core:
    path: ../../xuan-metaphysics-core
  theme:
    path: ../../theme
  xuan_four_zhu_card:
