name: persistence_drift
description: Drift adapters for persistence_core.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.0.2 <4.0.0'
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.30.1
  persistence_core:
    git:
      url: http://xuan:***@192.168.0.165:3000/xuan/xuan-storage.git
      ref: main
      path: core
  persistence_domain:
    path: ../../xuan-domain
  xuan_common:
    path: ../../xuan-common
  divination_case:
    path: ../../xuan-divination-case
  repository_interface_four_zhu_card:
    path: ../../repository-interface-four-zhu-card

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  drift_dev: ^2.30.1

